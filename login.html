<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drip Capital — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;700&display=swap"
    rel="stylesheet"
  />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F4F6F7;
      font-family: 'Nunito Sans', sans-serif;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 4px 24px rgba(10, 46, 87, 0.08);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: #26B67F;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark svg { width: 20px; height: 20px; }

    .logo-name {
      font-size: 20px;
      font-weight: 700;
      color: #0A2E57;
      letter-spacing: -0.3px;
    }

    .heading {
      font-size: 24px;
      font-weight: 700;
      color: #0A2E57;
      margin-bottom: 6px;
    }

    .subheading {
      font-size: 14px;
      font-weight: 400;
      color: #6F8298;
      margin-bottom: 32px;
    }

    .form { display: flex; flex-direction: column; gap: 20px; }

    .alert-slot { min-height: 0; }

    .forgot {
      text-align: right;
      margin-top: -10px;
    }

    .forgot a {
      font-size: 13px;
      color: #217DE5;
      text-decoration: none;
      font-weight: 400;
    }
    .forgot a:hover { text-decoration: underline; }

    .btn-row { margin-top: 4px; }
    drip-button { width: 100%; display: block; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #95A3B3;
      font-size: 13px;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #E2E8EF;
    }

    .footer {
      text-align: center;
      font-size: 13px;
      color: #6F8298;
      margin-top: 24px;
    }
    .footer a {
      color: #217DE5;
      text-decoration: none;
      font-weight: 700;
    }
    .footer a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .card { padding: 32px 20px 28px; }
      .heading { font-size: 20px; }
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- Logo -->
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 10a6 6 0 1 1 12 0A6 6 0 0 1 4 10z" fill="white" opacity=".3"/>
          <path d="M10 4v12M4 10h12" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="logo-name">Drip Capital</span>
    </div>

    <!-- Heading -->
    <h1 class="heading">Welcome back</h1>
    <p class="subheading">Sign in to your account to continue</p>

    <!-- Alert area (hidden by default, shown on error) -->
    <div class="alert-slot" id="alert-slot"></div>

    <!-- Form -->
    <form class="form" id="login-form" novalidate>

      <drip-input
        id="field-email"
        label="Email address"
        placeholder="you@company.com"
        type="email"
        name="email"
      ></drip-input>

      <div>
        <drip-input
          id="field-password"
          label="Password"
          placeholder="Enter your password"
          type="password"
          name="password"
        ></drip-input>
        <div class="forgot"><a href="#">Forgot password?</a></div>
      </div>

      <div class="btn-row">
        <drip-button id="submit-btn" type="submit" variant="primary" size="large">
          Sign In
        </drip-button>
      </div>

      <div class="divider">or</div>

      <drip-button type="button" variant="secondary" size="large" id="sso-btn">
        Continue with SSO
      </drip-button>

    </form>

    <p class="footer">
      Don't have an account? <a href="#">Request access</a>
    </p>
  </div>

  <!-- Web Components -->
  <script type="module" src="/src/components/DripButton.js"></script>
  <script type="module" src="/src/components/DripInput.js"></script>
  <script type="module" src="/src/components/DripAlert.js"></script>

  <script type="module">
    const form        = document.getElementById('login-form');
    const emailField  = document.getElementById('field-email');
    const passField   = document.getElementById('field-password');
    const submitBtn   = document.getElementById('submit-btn');
    const alertSlot   = document.getElementById('alert-slot');

    function showAlert(variant, title, message = '') {
      alertSlot.innerHTML = '';
      const alert = document.createElement('drip-alert');
      alert.setAttribute('variant', variant);
      alert.setAttribute('size', message ? 'large' : 'small');
      alert.setAttribute('title', title);
      if (message) alert.setAttribute('message', message);
      alert.setAttribute('dismissible', '');
      alert.style.marginBottom = '20px';
      alertSlot.appendChild(alert);
    }

    function clearAlerts() {
      alertSlot.innerHTML = '';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlerts();

      const email    = emailField.value.trim();
      const password = passField.value;

      // Basic validation
      let hasError = false;

      if (!email) {
        emailField.setAttribute('error', 'Email address is required');
        hasError = true;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        emailField.setAttribute('error', 'Please enter a valid email address');
        hasError = true;
      } else {
        emailField.removeAttribute('error');
      }

      if (!password) {
        passField.setAttribute('error', 'Password is required');
        hasError = true;
      } else {
        passField.removeAttribute('error');
      }

      if (hasError) return;

      // Simulate loading state
      submitBtn.setAttribute('disabled', '');
      submitBtn.textContent = 'Signing in…';

      // Simulate async auth (replace with real API call)
      await new Promise(r => setTimeout(r, 1200));

      // Demo: wrong credentials for anything except demo@drip.com / password
      if (email === 'demo@drip.com' && password === 'password') {
        showAlert('success', 'Signed in successfully! Redirecting…');
        submitBtn.textContent = 'Sign In';
        submitBtn.removeAttribute('disabled');
      } else {
        showAlert(
          'error',
          'Invalid email or password',
          'Please check your credentials and try again.'
        );
        submitBtn.textContent = 'Sign In';
        submitBtn.removeAttribute('disabled');
      }
    });

    // Clear field errors on input
    emailField.addEventListener('input', () => emailField.removeAttribute('error'));
    passField.addEventListener('input',  () => passField.removeAttribute('error'));
  </script>

</body>
</html>
